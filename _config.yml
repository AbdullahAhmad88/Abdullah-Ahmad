# Theme Settings
minimal_mistakes_skin: "dark"
remote_theme: mmistakes/minimal-mistakes@4.28.0

# Site Settings
locale: "en-US"
title: "Abdullah Ahmad Mirza | Portfolio"
title_separator: "-"
name: "Abdullah Ahmad"
description: "Computer Engineering Student at UET | Exploring AI, Software Dev, and Digital Design."

# GitHub Pages URL
url: "https://abdullahahmad88.github.io"
baseurl: "/Abdullah-Ahmad"
repository: "AbdullahAhmad88/Abdullah-Ahmad"

# Author Info
author:
  name: "Abdullah Ahmad Mirza"
  avatar: "/assets/images/profiles.jpeg"
  bio: "Computer Engineering Student @ UET. Focused on AI and Software Development."
  location: "Faisalabad, Pakistan"
  email: "abdullahahmadmirza42@gmail.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/AbdullahAhmad88"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:abdullahahmadmirza42@gmail.com"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/AbdullahAhmad88"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

# Reading Files
include:
  - _pages

exclude:
  - "*.gemspec"
  - "*.gem"
  - Gemfile
  - Gemfile.lock
  - Rakefile
  - vendor
  - CHANGELOG.md
  - README.md
  - LICENSE
  - docs
  - test

# Markdown
markdown: kramdown
highlighter: rouge

# Permalink
permalink: /:categories/:title/

# Pagination
paginate: 5
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true

# Archives
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/
