---
# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site.

# Theme Settings
minimal_mistakes_skin    : "contrast"

# Site Settings
locale                   : "en-US"
title                    : "Abdullah Ahmad Mirza | Portfolio"
title_separator          : "-"
name                     : "Abdullah Ahmad"
description              : "Computer Engineering Student at UET | Exploring AI, Software Dev, and Digital Design."
url                      : "https://abdullahahmad88.github.io" # Fixed: Points to your live site
baseurl                  : "/Abdullah-Ahmad" # Added: This matches your repository subpath
repository               : "AbdullahAhmad88/Abdullah-Ahmad"
words_per_minute         : 200

# Site Author
author:
  name             : "Abdullah Ahmad Mirza"
  avatar           : "/assets/images/profiles.jpeg"
  bio              : "Computer Engineering Student @ UET. Focused on AI and Software Development."
  location         : "Faisalabad, Pakistan"
  email            : "abdullahahmadmirza42@gmail.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/AbdullahAhmad88"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:abdullahahmadmirza42@gmail.com"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - package.json
  - package-lock.json
  - vendor/bundle/
  - vendor/cache/

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Outputting
permalink: /:categories/:title/
timezone: "Asia/Karachi"

# Pagination
paginate: 5
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives (Fixes the 404 Error)
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
