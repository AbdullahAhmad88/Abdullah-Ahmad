# Theme Settings
minimal_mistakes_skin: "contrast"

# Site Settings
locale: "en-US"
title: "Abdullah Ahmad Mirza | Portfolio"
title_separator: "-"
name: "Abdullah Ahmad"
description: "Computer Engineering Student at UET | Exploring AI, Software Dev, and Digital Design."

# 🔴 IMPORTANT FIX (GitHub Pages URL)
url: "https://abdullahahmad88.github.io"
baseurl: ""

repository: "AbdullahAhmad88/AbdullahAhmad88.github.io"

# Author Info
author:
  name: "Abdullah Ahmad Mirza"
  avatar: "/assets/images/profiles.jpeg"
  bio: "Computer Engineering Student @ UET. Focused on AI and Software Development."
  location: "Faisalabad, Pakistan"
  email: "abdullahahmadmirza42@gmail.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/AbdullahAhmad88"

    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:abdullahahmadmirza42@gmail.com"

    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/AbdullahAhmad88"

    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

# Reading Files
include:
  - _pages

exclude:
  - node_modules
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock

# Markdown
markdown: kramdown
highlighter: rouge

# Permalink
permalink: /:categories/:title/

# Pagination
paginate: 5
paginate_path: /page:num/

# Plugins (GitHub supported)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      # Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
